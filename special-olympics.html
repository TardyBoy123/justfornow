<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Special Olympics Athletes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h1, h2 {
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .section {
      display: none;
      margin-top: 30px;
    }

    .section.active {
      display: block;
    }

    .menu-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .sports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    button {
      padding: 20px;
      border: none;
      border-radius: 12px;
      background: #ffffff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .menu-buttons button {
      width: 220px;
    }

    .logo-container {
      text-align: center;
      margin-top: 50px;
    }

    .special-logo {
      width: 220px;
      max-width: 80%;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    ul {
      margin-top: 10px;
    }

    .back-btn {
      margin-top: 20px;
      background: #ddd;
    }

    .help-box {
      background: #fff3cd;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    a.email-link {
      text-decoration: none;
      color: white;
      background: #0077cc;
      padding: 15px 25px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Special Olympics Athletes</h1>

  <div id="mainMenu" class="section active">
    <div class="menu-buttons">
      <button onclick="showSection('sportsSection')">Sports</button>
      <button onclick="showSection('helpSection')">I Need Help</button>
      <button onclick="showSection('contactSection')">Contact</button>
    </div>

    <div class="logo-container">
      <img
        src="Logo_Special_Olympics.svg"
        alt="Special Olympics Logo"
        class="special-logo"
      >
    </div>
  </div>

  <div id="sportsSection" class="section">
    <h2>Select Your Sport</h2>

    <div class="sports-grid">
      <button onclick="showSport('basketball')">Basketball</button>
      <button onclick="showSport('bocce')">Bocce</button>
      <button onclick="showSport('bowling')">Bowling</button>
      <button onclick="showSport('figureSkating')">Figure Skating</button>
      <button onclick="showSport('floorBall')">Floor Ball</button>
      <button onclick="showSport('floorHockey')">Floor Hockey</button>
      <button onclick="showSport('gymnastics')">Gymnastics</button>
      <button onclick="showSport('indoorSoccer')">Indoor Soccer</button>
      <button onclick="showSport('powerLifting')">Power Lifting</button>
      <button onclick="showSport('skiing')">Skiing</button>
      <button onclick="showSport('speedSkating')">Speed Skating</button>
      <button onclick="showSport('swimming')">Swimming</button>
      <button onclick="showSport('volleyball')">Volleyball</button>
      <button onclick="showSport('pickleball')">Pickleball</button>
      <button onclick="showSport('golf')">Golf</button>
      <button onclick="showSport('softball')">Softball</button>
      <button onclick="showSport('tball')">T Ball</button>
      <button onclick="showSport('trackField')">Track and Field</button>
    </div>

    <button class="back-btn" onclick="goHome()">Back</button>
  </div>

  <div id="helpSection" class="section">
    <div class="help-box">
      If this is an emergency, call 911.<br><br>
      If this is not an emergency, contact your coach.
    </div>

    <button class="back-btn" onclick="goHome()">Back</button>
  </div>

  <div id="contactSection" class="section">
    <div class="card" style="text-align:center;">
      <h2>Contact</h2>

      <p>If you need help or have questions, send an email.</p>

      <a class="email-link" href="mailto:kiyansade@gmail.com">
        Send Email
      </a>
    </div>

    <button class="back-btn" onclick="goHome()">Back</button>
  </div>

  <div id="sportDetails" class="section"></div>

</div>

<script>
const sports = {
  basketball: {
    title: "Basketball",
    text: "Basketball players need to warm up their legs, shoulders, and heart before playing.",
    exercises: ["Jog in place for 1 minute", "Arm circles", "High knees", "Side shuffles"]
  },
  bocce: {
    title: "Bocce",
    text: "Bocce players should warm up slowly and focus on balance and arm movement.",
    exercises: ["Shoulder rolls", "Gentle walking", "Wrist circles", "Light stretches"]
  },
  bowling: {
    title: "Bowling",
    text: "Bowling warm ups help protect the shoulders and wrists.",
    exercises: ["Arm swings", "Wrist stretches", "Shoulder circles", "Walking lunges"]
  },
  figureSkating: {
    title: "Figure Skating",
    text: "Figure skaters should warm up balance, legs, and flexibility.",
    exercises: ["Leg swings", "Toe touches", "Balance on one foot", "Light jogging"]
  },
  floorBall: {
    title: "Floor Ball",
    text: "Floor ball players should prepare for quick movement and stick handling.",
    exercises: ["Side shuffles", "Quick feet", "Arm swings", "Light jogging"]
  },
  floorHockey: {
    title: "Floor Hockey",
    text: "Floor hockey warm ups help prepare the legs and upper body.",
    exercises: ["Jogging", "Stick handling practice", "Arm circles", "Squats"]
  },
  gymnastics: {
    title: "Gymnastics",
    text: "Gymnasts should focus on flexibility and body control.",
    exercises: ["Toe touches", "Arm stretches", "Jumping jacks", "Balance practice"]
  },
  indoorSoccer: {
    title: "Indoor Soccer",
    text: "Soccer players should warm up their legs and get their heart rate up.",
    exercises: ["Jogging", "High knees", "Leg swings", "Side shuffles"]
  },
  powerLifting: {
    title: "Power Lifting",
    text: "Power lifters should warm up muscles slowly before lifting heavy weights.",
    exercises: ["Bodyweight squats", "Arm circles", "Light stretching", "Practice lifts with low weight"]
  },
  skiing: {
    title: "Skiing",
    text: "Skiers should prepare their legs and improve balance before skiing.",
    exercises: ["Squats", "Balance practice", "Leg swings", "Light jogging"]
  },
  speedSkating: {
    title: "Speed Skating",
    text: "Speed skaters need strong legs and balance for skating.",
    exercises: ["Side lunges", "Leg swings", "Jogging", "Balance drills"]
  },
  swimming: {
    title: "Swimming",
    text: "Swimmers should warm up their shoulders and body before entering the pool.",
    exercises: ["Arm circles", "Shoulder stretches", "Light jumping jacks", "Walking"]
  },
  volleyball: {
    title: "Volleyball",
    text: "Volleyball players should warm up their arms and legs before jumping and hitting.",
    exercises: ["Arm swings", "Jumping jacks", "Side shuffles", "Light jogging"]
  },
  pickleball: {
    title: "Pickleball",
    text: "Pickleball warm ups help with quick movement and arm control.",
    exercises: ["Wrist circles", "Side shuffles", "Walking lunges", "Shoulder rolls"]
  },
  golf: {
    title: "Golf",
    text: "Golf players should warm up their shoulders, back, and hips.",
    exercises: ["Torso twists", "Shoulder circles", "Hip stretches", "Light walking"]
  },
  softball: {
    title: "Softball",
    text: "Softball players should prepare their throwing arm and legs.",
    exercises: ["Arm circles", "Jogging", "High knees", "Practice throws"]
  },
  tball: {
    title: "T Ball",
    text: "T Ball players should warm up gently before playing.",
    exercises: ["Walking", "Arm circles", "Light jogging", "Practice swings"]
  },
  trackField: {
    title: "Track and Field",
    text: "Track athletes should prepare for running and movement.",
    exercises: ["High knees", "Butt kicks", "Leg swings", "Jogging"]
  }
};

function showSection(id) {
  document.querySelectorAll(".section").forEach(section => {
    section.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function goHome() {
  showSection("mainMenu");
}

function showSport(sportKey) {
  const sport = sports[sportKey];
  const details = document.getElementById("sportDetails");

  details.innerHTML = `
    <div class="card">
      <h2>${sport.title}</h2>
      <p>${sport.text}</p>

      <h3>Warm Up Exercises</h3>
      <ul>
        ${sport.exercises.map(ex => `<li>${ex}</li>`).join("")}
      </ul>

      <button class="back-btn" onclick="showSection('sportsSection')">
        Back to Sports
      </button>
    </div>
  `;

  showSection("sportDetails");
}
</script>

</body>
</html>
